body:
  text: 樂府有所思長門與長信憂思並難任洞房明月下空庭緑草深怨歌裁潔素能賦受黃金復聞隔湘水猶言限桂林悽悽日已暮誰見此時心文苑英華二百二樂府詩集十七詩紀百二十二日出東南隅行初月正如鉤懸光入綺樓中有可憐妾如恨亦如羞深情出豔語密意滿橫眸楚腰寧且細孫眉本未愁青玉勿當取雙銀詎可留會待東方騎遙居最上頭文苑英華百九十三樂府詩集二十八詩紀百二十二櫂歌行秋江見底清越女復傾城方舟共採摘最得可憐名落花流寶珥微吹動香纓帶垂連理濕櫂舉木蘭輕順風傳細語因波寄遠情誰能結錦纜薄暮隱長汀文苑英華二百三樂府詩集四十詩紀百二十二美女篇京洛多妖豔餘香愛物華俱臨鄧渠水共採鄴園花時搖五明扇聊駐七香車情疏看笑淺嬌深眄欲斜微津染長黛新溜濕輕紗莫言人未解隨君獨問家文苑英華百九十三樂府詩集六十三詩紀百二十二升天行尋師得道訣輕舉厭人群玉山候王母珠庭謁老君煎為返魂藥刻作長生文飛策乘流電雕軒曳彩雲玄洲望不極赤野眺無垠金樓旦𡾰嵼玉樹曉氛氳擁琴遙可聽吹笙遠詎聞不覺蜉蝣子生死何紛紛文苑英華百九十三樂府詩集六十三詩紀百二十二神仙篇浮生厭危促名嶽共招攜雲軒遊紫府風駟上丹梯時見遼東鶴屢聽淮南雞玉英持作寶瓊實採成蹊飛策揚輕電懸旌耀彩霓瑞銀光似燭靈石髓如泥寥廓鸞山右超越鳳洲西一丸應五色持此救人迷文苑英華百九十三樂府詩集六十四詩紀百二十二河曲遊鄴下盛風流河曲有名遊應徐託後乘車馬踐芳洲丰茸雞樹密遙裔鶴煙稠日上疑高蓋雲起類重樓金羈自沃若蘭棹成夷猶懸匏動清吹采菱轉豔謳還珂響金埒歸袂拂銅溝唯畏三春晚勿言千載憂樂府詩集七十七詩紀百二十二城南隅宴城南氣初新才王邀故人輕盈雲映日流亂鳥啼春花飛北寺道絃散南漳濱舞動淮南袖歌揚齊后塵駢鑣歇夜馬接軫限歸輪公孫飲彌月平原宴浹旬即是消聲地何須遠避秦樂府詩集七十七詩紀百二十二蜀國弦西蜀稱天府由來擅沃饒雲浮玉壘夕日映錦城朝南尋九折路東上七星橋琴心若易解令客豈難要文苑英華二百一樂府詩集三十作蜀國吟詩紀百二十二採蓮曲曲浦戲妖姬輕盈不自持擎荷愛圓水折藕弄長絲珮動裙風入妝銷粉汗滋菱歌惜不唱須待暝歸時樂府詩集五十詩紀百二十二從軍行朔方烽火照甘泉長安飛將出祁連犀渠玉劍良家子白馬金羈俠少年平明偃月屯右地薄暮魚麗逐左賢谷中石虎經銜箭山上金人曾祭天天涯一去無窮已薊門迢遞三千里朝見馬嶺黃沙合夕望龍城陳雲起庭中奇樹已堪攀塞外征人殊未還白雪初下天山外浮雲直上五原間關山萬里不可越誰能坐對芳菲月流水本自斷人腸堅冰舊來傷馬骨邊庭節物與華異冬霰秋霜春不歇長風蕭蕭渡水來歸鴈連連映天沒從軍行軍行萬里出龍庭單于渭橋今已拜將軍何處覓功名文苑英華百九十九樂府詩集三十二詩紀百二十二又御覽三百三十五引賢一韻仰贈特進陽休之一首并序夫士之在俗所以騰聲邁實鬱為時宗者厥塗有三焉才也位也年也才則弘道立言師範雅俗位則乘軒服冕燮代天工年則二膳杖朝致養膠序緬尋古始永鑒前哲齒歷身名鮮能俱泰特進陽公兼而有之矣大齊武平之五載抗表懸車難進之風首振頽俗余不勝嘉仰敬贈是詩幽求遂古逖聽前聞鴻荒眇邈篆策絪縕體國經野為鳥為雲果行育德或武或文於鑠君子含章挺秀龍翰鳳翼玉榮松茂逸韻孤峙奇峰回搆慕舜匪高希顏可陋藝殫文府學究書林盡則窮麗索隱鉤深靈珠耀手明鏡懸心聲偃華裔道冠衣簪豹變其文鴻漸於陸入作卿士出為嶽牧千社萬鍾玄冕丹轂神之聽之介以景福漢稱廣德晉美劇陽君亦高蹈二此鴻芳知足知止令問令望功遂身退休有烈光聞風伯夷懦夫自立祖道疏傅行人霣泣公之戾止僚友胥集瞻彼高山每懷靡及余實膚陋少不及門挾策問道捧帚承恩以茲高義被於後昆式歌且舞敢贈長言文館詞林百五十八駕出圜丘開年簡時日上辛稱天吉平曉禁門開隱隱乘輿出乘輿出九重金根御六龍章移千乘動斾舉百神從黃麾引朱節靈鼓應華鍾神歌已相續神光復相燭風中揚紫煙壇上埋蒼玉初學記十三萬花谷後十二作盧思道詩詩紀百二十二贈李若初發清漳浦春草正萋萋今留素滻曲夏木已成蹊塵起星橋外日落寶壇西庭空野煙合巢深夕羽迷短歌雖製素長吟當執圭寄語當窗婦非關惜馬蹄文苑英華二百四十八詩紀百二十二贈別司馬幼之南聘故交忽千里輶車蒞遠盟幽人重離別握手送征行晚霞浮極浦落景照長亭拂霧揚龍節乘風遡鳥旌楚山百重映吳江萬仞清夏雲樓閣起秋濤帷蓋生陸侯持寶劍終子繫長纓前修亦何遠君其勗令名類聚五十三文苑英華二百九十六並作贈司馬幼之南聘詩紀百二十二贈劉儀同西聘開邛昔柔遠賓越盡招攜豈若馳天使玉節撫遺黎五祠臨渭北雙嶺帶崤西故關看金馬餘壇聽寶雞垂絲被柳陌落錦覆桃蹊分袪俄易慘離思實難齎極野雲峰合遙嶂日輪低塵暗前旌沒風長後騎嘶灞陵行可望函谷久無泥須君勞旋罷春草共萋萋文苑英華二百四十八詩紀百二十二遊梁城揚鑣歷汴浦回扈入梁墟漢藩文雅地清塵曖有餘賓遊多任俠臺苑盛簪裾歎息徐公劍悲涼鄒子書亭皋落照盡原野沍寒初鳥散空城夕煙銷古樹疏東越嚴子陵西蜀馬相如修名竊所慕長謠獨課虛文苑英華三百九詩紀百二十二寺從駕經大慈照寺玄風冠東戶內範軼西陵大川開寶匣福地下金繩繡栭高可映畫栱疊相承日馭非難假雲師本易憑陽室疑停燧陰軒類鑒冰迥題飛星沒長楣宿露凝旌門曙光轉輦道夕雲蒸山祇效靈物水若薦休徵薄命叨恩紀微軀竊自陵優游徒可恃周賚永難勝廣弘明集三十詩紀百二十二春夕經行留侯墓少小期黃石晚年遊赤松應成羽人去何忽掩高封疏蕪枕絶野邐迤帶斜峰墳荒隧草沒碑碎石苔濃狙秦懷猛氣師漢挺柔容盛烈芳千祀深泉閉九重夕風吟宰樹遲光落下舂遂令懷古客揮淚獨無蹤文苑英華三百六詩紀百二十二上巳禊飲上已巳禊飲山泉好風日城市厭囂塵聊持一樽酒共尋千里春餘光下幽桂夕吹舞青蘋何言出關後重有入林人類聚四初學記四古今歲時雜詠十六文苑英華百十七御覽三十詩紀百二十二又歲華紀麗一作隋思道詩引春一韻夜聞鄰妓倡樓對三道吹臺臨九重笙隨山上鶴笛奏水中龍怨歌聲易斷妙舞態難逢誰能暫留客解佩一相從初學記十五文苑英華二百十三萬花谷後三十二作盧思道詩詩紀百二十二又類聚四十二引重龍從三韻賦得珠簾鑑帷明欲斂照檻色將晨可憐疏復密隱映當窗人浮清帶遠吹含光動細塵落花時屢拂會待玉階春初學記二十五詩紀百二十二彭城王挽歌旭旦禁門開隱隱靈輿發才看鳳樓迥稍視龍山沒猶陳五營騎尚聚三河卒容衛儼未歸空山照秋月初學記十四文苑英華三百十御覽五百五十二詩紀百二十二樂平長公主挽歌粧樓對馳道吹臺臨景舍風入上春朝月滿涼秋夜未言歌笑畢已覺生榮謝何時洛水湄芝田解龍駕初學記十四文苑英華三百十御覽五百五十二詩紀百二十二後園宴常聞崑閬有神仙雲冠羽佩得長年秋夕風動三珠樹春朝露濕九芝田不如鄴城佳麗所玉樓銀閣與天連太液回波千丈映上林花樹百枝然流風續洛渚行雲在南楚可憐白水神可念青樓女便妍不羞澀妖豔工言語池苑正芳菲得戲不知歸媚眼臨歌扇嬌香出舞衣纖腰如欲斷側髻似能飛南樓日已暮長簷鳥應度竹殿遙聞鳳管聲虹橋別有羊車路攜手傍花叢徐步入房櫳欲眠衣先解半醉臉逾紅日日相看轉難厭千嬌萬態不知窮欲知妾心無劇已明月流光滿帳中文苑英華二百十四詩紀百二十二又草堂詩箋十六空囊詩注引女語二韻聽鳴蟬篇聽鳴蟬此聽悲無極群嘶玉樹裏回噪金門側長風送晚聲清露供朝食晚風朝露實多宜秋日高鳴獨見知輕身蔽數葉哀鳴抱一枝流亂罷還續酸傷合更離暫聽別人心即斷才聞客子淚先垂故鄉已超忽空庭正蕪沒一夕復一朝坐見涼秋月河流帶地從來嶮峭路干天不可越紅塵早敝陸生衣明鏡空悲潘掾髮長安城裏帝王州鳴鐘列鼎自相求西望漸臺臨太液東瞻甲觀距龍樓說客恆持小冠出越使常懷寶劍遊學仙未成便尚主尋源不見已封侯富貴功名本多豫繁華輕薄盡無憂詎念嫖姚嗟木梗誰憶田單倦土牛歸去來青山下秋菊離離日堪把獨焚枯魚宴林野終成獨校子雲書何如還驅少游馬類聚九十七作聽鳴蟬詩詩紀百二十二
