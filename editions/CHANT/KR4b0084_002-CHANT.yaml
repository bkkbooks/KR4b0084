body:
  text: 卷二納涼賦祝融司方朱明屆序氣乃初伏節惟徂暑積歊蒸于簾櫳流煩溽于園籞陽風淟其長扇火雲赫而四舉爾乃警六御案三條擊鼉鼓吹鳳簫雲車錯轂麟馬齊鑣入雲宮之𡾰嵼登仙觀之岧嶢引雄風于洞穴承清露于丹霄動颼飀于翠帳散霏微于綺寮初學記三孤鴻賦并序余志學之歲自鄉里遊京師便見識知音歷受群公之眷年登弱冠甫就朝列談者過誤遂竊虛名通人楊令君邢特進已下皆分庭致禮倒屣相接翦拂吹噓長其光價而才本駑拙性實疎嬾勢利貨殖淡然不營雖籠絆朝市且三十載而獨往之心未始去懷抱也攝生舛和有少氣疾分符坐嘯作守東原洪河之湄沃野彌望囂務既屏魚鳥為鄰有離群之鴻為羅者所獲野人馴養貢之于余置諸池庭朝夕賞翫既用銷憂兼以輕疾大易稱鴻漸于陸羽儀盛也揚子曰鴻飛冥冥騫翥高也淮南云東歸碣石違溽暑也平子賦曰南寓衡陽避祁寒也若其雅步清音遠心高韻鵷鸞以降罕見其儔而鎩翮牆陰偶影獨立唼喋粃粺雞鶩為伍不亦傷乎余五十之年忽焉已至永言身事慨然多緒乃為之賦聊以自慰云其詞曰惟此孤鴻擅奇羽蟲實稟清高之氣遠生遼碣之東氄毛將落和鳴順風壯冰云厚矯翅排空出島嶼之緜邈犯霜露之溟濛驚絓魚之密網畏落雁之虛弓若其斗柄東指女夷司月乃遙集于寒門遂輕舉于玄闕至如天高氣肅搖落在時既嘯儔于淮浦亦弄吭于江湄摩赤霄以淩厲乘丹氣之威夷遡商飆之嫋嫋翫陽景之遲遲彭蠡方春洞庭初綠理翮整翰群浮侶浴振雪羽而臨風掩霜毛而候旭饜江湖之菁藻飫原野之菽粟行離離而高逝響噰噰而相續絜齊國之冰紈晧密山之華玉若乃晨沐清露安趾徐步夕息芳洲延頸乘流違寒競逐浮沅水宿避暑言歸絕漠雲飛望玄鵠而為侶比朱鷺而相依倦天衢之冥漠降河渚之芳菲忽值羅人設網虞者懸機永辭寥廓蹈迹重圍始則窘束籠樊憂憚刀俎靡軀絕命恨失其所終乃馴狎園庭栖託池籞稻梁為惠恣其容與于是翕羽宛頸屏氣銷聲滅煙霞之高想閟江海之幽情何時驤首奮翼上淩太清騫翥鼓舞遠薄層城惡禽視而不貴小鳥顧而相輕安控地而無恥豈沖天之復榮若夫圖南之羽偉而去羨栖睫之蟲微而不賤各遂性于天壤弗企懷以交戰不聽咸池之樂不饗太牢之薦匹晨雞而共飲偶野鳧以同膳匪揚聲以顯聞寍校體而求見聊寓形乎沼沚且夷心于溏淀齊榮辱以晏如承君子之餘眄隋書盧思道傳在齊為百官賀甘露表竊以河榮洛變授祉于勛華玄玉素鱗降靈于湯武其閒微禽弱草改狀移形夜宿朝雲呈光動色皆以照臨下土發揮帝載千祀一致隔代同符伏惟陛下上揔天維傍握河紀持欽翼之小心纂昇平之大業萬靈翹首應三台以西巡兩儀貞觀乘六氣而東指卿雲既出還聞百辟之歌河清可俟實弭萬人之歎而上玄乃顧神物薦委飛甘灑潤玉散珠連昔魏明仙掌竟無靈液漢武金盤空望雲表豈若神漿可挹流珠九戶之前天酒自零凝照三階之下斯實曠代祥符前主罕遇休矣美矣皇哉唐哉臣等竝邀昌運俱沐玄造驟聞祕祉亟覩冥貺振鱗撫翼空馳魚鳥之心瘞玉編金方待云亭之后初學記二露五奏大理未可除省有駕部寺留太僕省有刑部寺除大理斯則重畜產而賤刑名誠為未可隋書盧思道傳時議置六卿將除大理思道上奏文為隋檄陳文告三江之表偽署君臣將帥州郡邑落士民等蓋聞上玄垂象列宿拱辰極之忠厚載成形百谷指滄溟之大是以三五以降哲王后遠覃聲教大燀威靈日月之所照臨俱荷亭育舟車之所通泊咸附象鞮我大隋積德累功開物成務光宅寰海覆幬烝民虞夏受終顧有慚德湯武革命未云盡善滄波已東九譯請吏玉門之右萬里無塵諸華冠帶之俗肆勤南畝皮服引弓之渠頓顙北關內外禔福區宇懾然皇上垂拱巖廊司契而已惟夫太伯之後實號勾吳少康之裔是為於越江界湫湄如掌之陋塗泥所集瘴癘自興自昔皇王列壤班瑞春秋之義爵不過子在晉永嘉運北數極司馬氏眾無一旅播越江濱劉蕭已還多歷世祀魏氏奄一神州置之度外且西吞巴蜀北據淮淝善人君子可以為國陳霸先下愚小醜品極輿隸屬揚部淪胥之日幸梁人殲敗之秋騁其姦回妄自尊大等蠻觸之戰爭似鰌魽之跳躍曇頊昏頑賊忍不義不慈剿厥猶子竊其偽位蜂蠆非毒谿壑易滿事甚楚圍之纓理切吳光之劍國小地狹虐用其民坑戮侔于屠伯芟夷過于薙氏加以沈迷麴糱酣酗終朝澆灌取盡夜以繼晝貨賄公行政刑不立疏棄良士狎近小人守宰蠶漁子弟荒暴頭會箕斂杼軸其空災異相仍稻蟹不熟江左黎獻戴目而視齊之季世實多涼德江淮之閒蹔為頊有便謂三春易求百年可致違卜愎諫黷武窮兵吳明徹程文秀之徒竝早經行陣粗有風力彼朝上下繫以存立呂梁之役貫盈惡稔曾未交綏雲卷霧徹組練塞垣艅艎噎水顧眄之頃隻輪不歸及周宣馭厤將一淮海荊舒之民奢侈為怨聊命偏裨拯其荼毒長江已北若火焚毛是則楊越之地為陳孤立卒獘壤蹙邦羸政塞乘奔無轡譬茲非險坐薪待燃方此為泰司馬消難切荷特私任居連率猜狂使酒竊地外犇曇頊背恩棄德是信是使引盜納姦無媿無畏天奪其魄憑犯不悛緣邊諸城犬羊荐食聖主以軒開萬國屬盡九州一隅不庭宜置天討爰詔六軍分閫受鉞西徵秦隴之銳北引燕代之英五校雄兒超乘俱起三河猛士援距爭奮虎夫萬隊豹騎千群竝骨勇肉飛風驤霧合憬彼江黃之眾逖矣彭濮之民巨艦高艫順流東指江都壽春之域扼喉撫背之兵飛龍赤馬絕水南越漢后昆明未足方其訓旅魏王玄武不能比其隸師陳以江湖之泥短衣祝髮輕舠利舸便習者多上迷天意下憑地險所以舉尾支山怒臂當轅今荊門銳卒致命前驅淮南義師賈勇競入揚舲振兔走鳧飛然則彼之所長我亦兼有我利涉大川匪旦伊夕江郢運艚吳會裔旅東西遏絕通致無由偽朝軍旅或陳誠款密使相尋蕞爾危邦表裏攜貳兼弱攻昧今也其時扛鼎蒙輪之卒事均驅兕三禮四義之將俛視韓白正正之旗百道俱進竝雲移雷動大會金陵牙旂暗山原金鼓沸天地呼吸則江漢迴流叱咤則衡疑可拔運岱山而壓春卵引渤海而濯秋螢當不足等其銷滅譬其虀粉猥以不武謬總戎律上稟廟堂之謀下資素飽之氣使張悌之魂先遊北斗呂嘉之級遠至新鄉漂櫓溺驂孱然已至亂麻積莽可為寒心偽主若天誘其誠去危轉禍審青蓋之欲歸知蔣山之應渡銜璧輿櫬拜手轅門則上比吳蜀之君不失公侯之寵陳之百辟卿士編戶黔庶有能深識逆順因事立功亦當服冕乘軒紆青佩紫疏爵酬庸待以不次王者之師全救為本萬姓毫釐靡所侵軼勉求多福無待噬臍檄之所到咸共申省文苑英華為高僕射與司馬消難書名白一成雲雨再歷炎涼引領南望勞眷無已歲暮寒重想比勝宜羈泊水鄉無乃勤悴公居齊室家實元勳後入周朝爵窮上等富貴榮名時無與二西征南逝蓋不獲已且聖主敬于恩舊情期款到背冰之始曲憲申恩公之妻孥一無所問行李往來想宜知悉陳氏背盟負約事非一緒所以爰詔大將軍龔行天罰靈旗電埽師次江陽延首金陵但增翹注昔龐萌重獲漢主宥其深辜魏洽再歸曹王棄其大眚惜其才也今古如一醉飽之過願不自疑兼齊氏王姬宛然在室諸子陸陸如何易忘門生故吏遍于京輔舊友密親擊鍾鼎食萬里飄然音塵不嗣眷言及此伊何可懷今元戎啟行易為去就承眷有素敢布腹心若使雙舠浮渡三叛獲俘函首長安悔無及也文苑英華六百八十三勞生論莊子曰大塊勞我以生誠哉斯言也余年五十羸老云至追惟疇昔勤矣厥生乃著茲論因言時云爾罷郡屏居有客造余者少選之頃盱衡而言曰生者天地之大德人者有生之最靈所以作配兩儀稱貴群品妍蚩愚智之辯天懸壤隔行己立身之異入海登山今吾子生于右地九葉卿族天授俊才萬夫所仰學綜流略慕孔門之游夏辭窮麗則擬漢日之卿雲行藏有節進退以禮不諂不驕無慍無懌偃仰貴賤之間從容語默之際何其裕也下走所欣羨焉余莞爾而笑曰未之思乎何所言之過也子其清耳請為左右陳之夫人之生也皆未若無生在余之生勞亦勤止紈綺之年服膺教義規行矩步從善而登巾冠之後濯纓受署繮鎖仁義籠絆朝市失翹陸之本性喪江湖之遠情淪此風波溺于倒躓憂勞總至事非一緒何則地冑高華既致嫌于管庫才識美茂亦受嫉于愚庸篤學強記聾瞽于焉側目清言河瀉木訥所以疚心豈徒蠱惜春漿鴟恡腐鼠相江都而永歎傅長沙而不歸固亦魯值臧倉楚逢靳尚趙壹為之哀歌張升于是慟哭有齊之季不遇休明申脰就鞅屏迹無地段珪張讓金貝是視賈謐郭淮腥臊可饜淫刑以逞禍近池魚耳聽惡來之讒足踐龍逢之血周氏末葉仍值僻王斂笏升階汗流浹背莒客之踵躋焦原匹茲非險齊人之手執馬尾方此未危若乃羊腸句注之道據鞍振筴武落雞田之外櫛風沐雨三旬九食不敢稱獘此之為役蓋其小小者耳今泰運啟開四門以穆冕旒司契于上夔龍佐命于下岐伯善卷恥徇幽憂卞隨務光悔從木石余年在秋方已迫知命情禮宜退不獲晏安一葉從風無損鄧林之攢植雙鳧退飛不虧渤澥之游泳耕田鑿井晚息晨興候南山之朝雲攬北堂之明月氾勝九穀之書觀其節制崔實四時之令奉以周旋晨荷蓑笠白屋黃冠之伍夕談穀稼霑體塗足之倫濁酒盈罇高歌滿席恍兮惚兮天地一指此野人之樂也子或以是羨余乎客曰吾子之事既聞之矣他人有心又請論其梗概余荅曰雲飛泥沈卑高異等圓行方止動息殊致是以摩霄運海輕罻羅于藪澤五衢四照忽斤斧于山林余晚值昌辰遂其弱尚觀人事之隕穫覩時路之邅危玄冬脩夜靜言長想可以累歎悼心流涕酸鼻人之百年脆促已甚奔駒流電不可為辭顧慕周章數紀之內窮通榮辱事無足道而有識者鮮無識者多褊隘凡近輕險躁薄居家則人面獸心不孝不義出門則諂諛讒佞無愧無恥退身知足忘伯陽之炯戒陳力就列棄周任之格言悠悠遠古斯患已積迄于近代此蠹尤深范卿撝讓之風搢紳不嗣夏書昏墊之罪執政所安朝露未晞小車盈董石之巷夕陽且落皁蓋填閻竇之里皆如脂如韋俯僂匍匐噉惡求媚舐痔自親美言諂笑助其愉樂詐泣佞哀恤其喪紀近通旨酒遠貢文蛇豔姬美女委如脫屣金銑玉華棄同遺跡及鄧通失路一簪之賄無餘梁冀就誅五侯之貴將起向之求官買職晚謁晨趨刺促望塵之舊遊伊優上堂之夜客始則亡魂褫魄若牛兄之遇獸心戰色沮似葉公之見龍俄而抵掌揚眉高視闊步結侶棄廉公之第攜手哭聖卿之門華轂生塵來如激矢雀羅蹔設去等絕絃飴蜜非甘山川未阻千變萬化鬼出神入為此者皆衣冠士族或有蓺能不恥不仁不畏不義靡愧友朋莫慚妻子外呈厚貌內蘊百心繇是則紆青佩紫牧州典郡冠幘劫人厚自封殖妍歌妙舞列鼎撞鍾耳倦絲桐口飫珍旨雖素論以為非而時宰不之責末俗蚩蚩如此之敝余則違時薄宦屏息窮居甚恥驅馳深畏乾沒心若死灰不營勢利家無儋石不費囊錢偶影聯官將數十載駑拙致笑輕生所以告勞也真人御宇斲雕為樸人知榮辱時反邕熙風力上宰內敷文教方邵重臣外揚武節被之大道洽以淳風舉必以才爵無濫授稟斯首鼠不預衣簪阿黨比周埽地俱盡輕薄之儔滅影竄迹礫石變成瑜瑾莨莠化為芝蘭曩之扇俗攪時駭耳穢目今悉不聞不見莫予敢侮易曰聖人作而萬物覩斯之謂乎隋書盧思道傳文苑英華七百五十八北齊興亡論或問主人曰往者魏人失御六合雲擾河朔關右翦為二國永熙西遁天平北巡兩朝先主分陜而霸龍戰虎爭多歷歲祀既而水運值竭天祿永終齊室比迹于唐虞周人踵武于漢魏齊有五帝周易四王竝纔踰二紀相繼而滅若其元首膺期股肱命世立極補天之業銘常鏤鼎之功至于暴君南面孼臣作輔民怨神怒國殄祀絕易世之由雖傳之耆舊載于史策通人雅旨其詳可得聞乎主人應之曰吾少仕齊朝晚歸周室因而學業歷茲永久雅好博古雖欲擬議近世治亂粵可略陳在魏正光牝雞司旦尒朱榮乘釁內奰滔天泯夏餘燼跋扈挻禍王城海內生民若崩厥角齊高祖神武皇帝天縱英明之略神挺雄武之才龍攄豹變投袂而起四明昆弟大會韓陵類蚩尤風雨之兵若新都犀象之陳彼曲我直天實贊之日未移晷大殲醜族然後拔立宗枝入纂皇統群后成務天下晏如但芒刺成災震逼為梗居鄭流彘去而不入遷鼎舊鄴國命維新朝章國憲燦然畢舉渭南失律似烏林之喪師洛北先鳴同官渡之凱入雖天命有歸而盡于北面方之魏武具體而微文襄嗣業始踰弱冠瓌傑之氣足稱負荷賓禮時秀驅駕群雄內外肅清朝無粃政侯景背恩棄義狼顧汝潁蕭衍失信幸災蟻聚彭汴于是謀臣運策猛士推鋒渦陽之役兇渠匹馬南逝寒山之戰吳卒隻輪不返王思政入據長安淹歷歲時神旗蹔臨如風埽籜三秦勍敵閉關自守五湖之長革音請命魏孝靜以天厤有在鼎祚將遺大禮備物率由舊典允恭克讓推而弗居禍生非慮匕首竊發爾其夷凶翦暴剛斷英峙天崩地拆堂構闕如嗣子幼沖未堪多難文宣雖云外弟少乏令名人望所歸便見推奉于時政有彝倫朝多俊乂爪牙皆韓白之伍心腹盡良平之儔外靜方隅內康庶績主之不才四海弗之覺也洎乎受終文祖燎天改物兵強地廣國富刑清發號施令必師古始信賞必罰如有四時年穀屢登災害不作敵人竄迹郊境無虞天保受命迄于五祀黃初泰始不能遠尚爰及中年誕縱昏德以萬乘之貴為長夜之飲散髮視朝肉袒聽政手行刳剔躬運矛鋋寵狎佞諛親愛凡鄙出入市廛遊走衢路太保高隆之佐命元功廟廊上宰僕射高德政龍潛賓友帷幄重臣衛尉卿杜弼碩學偉才拔萃出類光祿大夫元景風流儒雅師範搢紳或赤族見誅或丹頸為戮竝直言竊歎斃于讒口自餘名士良臣非罪遭命淫刑以逞不可殫言劉曹以還逮于僭偽受命稱帝未有若斯之慘者也賴有尚書令弘農楊遵彥魏太傅津之子也含章秀出希世偉人風鑑俊朗體局貞固學無不縱才靡不通裴樂謝其清吉應劉媿其藻麗溫良恭儉讓恕惠和高行異才近古無二有齊建國便預經綸軍國政事一人而已詰旦坐朝諮請填湊千端萬緒令議如流剖斷部領選舉人物滿室盈庭永無凝滯虛襟泛愛禮賢好事聞人之善若己有之智調有餘尤善當世譖言屢入時寄無改每乘輿四巡恆守京邑凡有善政皆遵彥之為是以主昏于上國治于下朝野貴賤至于今稱之俄而文宣不豫獘于趨孼儲君繼體纔歷數旬近習預權小人竝進楊公慮有危機引身移疾幼主若喪股肱固相敦勉乾明之始難起戚藩變成倏忽殞于殿省詩云人之云亡邦國殄悴君子是以知齊祚之不昌也孝昭地乃密親位居元輔有姬公之戚無復子之心亦由主弱時艱慮深家國當陽正位事出權道身長八尺腰帶十圍沈深謹厚實有君人之望時甲卒強盛財力殷阜乃睠西顧恆有吞噬之心兼以天保之後懲其淫縱不邇聲色不事晏遊孝于太后篤于昆季慎惜名器愛養黎元後庭嬪嬙皆是藩邸之舊數不盈十竟無私寵特解吏事尤好禮容但政苛碎暗于聽受降年不永朞歲而崩大漸維幾黜其元子武成母弟之親入主宗祏而少稟凶德不孝不仁龍攢在殯淚不承臉太后之喪亦不哀哭纔及公除便衣縫裘縱侈荒淫不知紀極甘酒耆音夜以繼晝有和士開者素有和氏之庶孼其面目亦似胡人輕薄凡猥為衣冠所棄武成在田之日引為參將聞好彈胡琵琵亦解歌舞一面之後便大相愛悅恆在臥內同食共寢淫穢之事無所不為天保之世文宣知其如此頓鞭二百徒配長城後遇赦得還武成為右丞相久別得還恩盼愈厚信宿之間賞賜巨萬及踐大位親顧彌隆爰自黃門漸至端右盡景娛侍略不休停就令蹔出便追騎相尋士開作威作福略無顧憚恩寵勢望燻灼朝野恣性貪淫人倫少例心如谿壑行均犬豕甲第當衢侔擬公室富商大賈朝夕盈門朝士無賴者亦競相諂媚或送婢妾或進子女筐篚苞苴烟聚波屬士開葬母傾朝追送諂諛尤甚者至悲不自勝澆薄邪佞愛踰弟兄名賢素士略不交言其所薦延奏無不遂榮枯進退定于俄頃于時下陵上替奔競成習士無貴賤風節頓盡趙彥深阿諛順旨俛首懷祿元文遙器能先見不敢措言此外群官靡衣媮食齊室大壞其原始于此矣河清之末長彗為災太史奏言須有禳救武成便自稱太上傳位後主胡長粲以從舅之親馮子琮以姨夫之戚俱受寄託竝當樞要或性識庸近或意懷險薄皆不學無術智能淺短及天統末年武成即世和士開一相處內自擬伊周太尉錄尚書事趙郡王叡明德茂親聰爽俊悟藩王之內時望隆重以士開凶醜宜加屏黜入踐青蒲讜言規諫而少主聰察不類成昭母后才明異于馬鄧士開禮于疏行長粲為其謀主遂使密戚賢王絞縊以戮雖遐邇胥怨愚智同憤而依託城社末如之何數載之閒肆其穢行與馮子琮夫婦鬻獄賣官三家府藏賄貨山積凶愚子弟竝處高資更相貨易擇而後授司徒琅邪王儼年甫十四兼領憲司憤其所為切齒忿咤執送南臺異其身首子琮以搆扇兩端一時依法二凶俱勦朝野晏清京師市里儛蹈成群梁董之慶不足斯比琅邪心實去惡跡乃陵上不容于時俄而賜盡自茲已後政道彌昏高阿那以牧圉之勤重其佞媚韓長鸞以韝紲之能悅其趨走又有女奴陸氏出自掖庭凶智狡筭舉世無匹以保母之恩特見尊寵六宮謂之世師人主以為內相舞弄王法掩塞天聽慶賞威刑出于婢口頑嚚弟姪布于列位帝戚皇支不能及也陸子駱提婆者出于皁隸本是靴工愚暗庸短僅辯菽麥與韓高之徒共持國柄宣淫肆暴甚于和氏窮極富貴轉日迴天愚薄之倫折枝舐痔輕者進貨賂甚者緒婚婣朝廷混然無復廉恥清貞守道更被嗤怪漢世張趙不能喻其萬一晉朝賈郭未足比其錙銖斛律明月屬鏤之錫冤動天地崔季舒龍逄之戮痛切幽明加以內參年少閹官之屬親狎寵私盈滿宮禁干預政事剽掠生民黔首呼嗟以日為歲其反道違常速亡趨滅事非一緒不可勝陳後主自生宮闈長于尼媼不接端士不見正人朝夕諮諏罕聞調護之客便煩左右莫匪刀鋸之餘飛鷹走狗蕩其心慮麗色淫聲亂其耳目論功德者云羲軒無以尚述欽明者稱堯舜不能踰才智之士棄而不任假有名級備員而已憲章綱紀蕩然無餘魚爛土崩以俟勍寇周武大捷平陽乘虛除入將有降心士無鬭志前世耿賈之雄俛眉頓顙先朝貔虎之銳斂氣重足舉晉陽如拾芥攻鄴宮猶振槁萬里百城交臂屈膝南極江淮北盡砂塞西界函谷東至滄溟府帑粟帛之饒兵革士民之眾齊之所畜盡為周有不亦哀哉文苑英華七百五十一後周興亡論周太祖文皇帝幼而機警智數過人屬魏末多故召募關隴值二將相屠三軍未一見推為主遂握兵符俄而魏武西巡奉迎車駕挾天子以會諸侯萬世所以一時也撫養荒餘鳩聚兵甲同心之旅不滿萬人齊神武以大兵數十萬將清灞滻雷動雲移萃于渭曲太祖以數千弊卒振旅而還遂基王業竇泰以勁兵深入一戰喪元高敖曹以銳氣先登臨陣授首兵革歲動敗鮮勝多高氏雖怙其眾力莫敢先至邙山之舉我師敗績收合亡散退守有餘及蕭氏將亡邊服震擾荊郢內附庸蜀來王器械完整貨財充實帶甲百萬驍將如林晏駕之辰國與齊人相埒矣閔帝以嫡嗣承基應天納禪弱齡厭世未及稱皇以庶長見立纂我鴻緒從容文雅亦守文之良主焉二帝景命不融高祖始登大位于時大冢宰晉公宇文護太祖之猶子也負圖作宰親受顧命國柄朝權頓去王室高祖高拱深視彌歷歲年談議儒玄無所關預祭則寡人晉公不之忌也但自下裁物其主不堪累世權強一朝折首其于黨與咸見夷戮惡禽臭物埽地無餘爾乃棄奢淫去浮偽施一德布公道屏重肉之膳躬大布之衣始自六宮被于九服令行禁止內外肅然以釋氏立教本貴清淨近世以來糜費財力下詔削除之亦前王所未行也值齊季失德取亂侮亡親御戎軒再舉而滅軍令肅然秋毫莫犯數巡而定不戮一人未及下車革其弊政山東士女欣戴如歸但天性嚴忍果于殺戮血流盈前無廢飲噉行幸四方尤好田獵從禽于外非夜不還飛走之類值無免者識者以此少之雖有武功未遑文德彝章禮教蓋闕如也甲治兵將掃沙漠遠圖不遂暴疾升遐宣帝初在東京已多罪失高祖每加嚴訓不能修改嗣位之初飾情自勵踰年已後變態轉興耽酒好色常居內寢角抵逸遊不捨晝夜分命使人徵求子女積之後宮以千萬數此石虎之淫風也寵姬四人竝立為皇后車服節文與內主無別此劉聰之亂政也少在儲宮頗覽經籍臨朝對眾亦有精神但稟猜狂特好詭異衣冠形色皆與舊制不同文武侍臣屏棄遐裔內外門閤皆別令宦者看守出入去來竝錄其數殿省以目相視然朋淫于家無所𥳑擇乃至長樂亦有醜聲大象之末忽焉慘虐鞭撻朝士動至數百背及胸腹一皆下手楚毒之理不可忍見祖宗廟號諱不得稱變易官名回官姓族車乘輪輻竝有貴賤之殊婦女粧點亦為上下之異後庭嬪妾房有數人自旦至夕恆令危坐相對有不如法便即捶楚內外命婦朔望朝謁皆令為丈夫拜伏以示肅恭自號為天不復稱朕此外小事異同不可勝紀狂惑妖僻開闢未之有也客曰齊武成荒悸庸暗怨結人神厥嗣不昌理則然矣周祖聰明神武冠世雄奇因愚子以至顛覆豈人事乎抑天道也蒙有惑焉請聞其說主人曰寒暑晦明二儀之不同也賢愚治亂五勝之相形也是以酒池肉林乃周王之締構坑儒滅學亦漢后之驅除齊自天保受終迄于武平喪國孝昭之外竟無令主河清已後國基漸墜昏主慢遊于上黎民怨讟于下逮于末葉君弱臣愚外崩內潰周人取之猶坂上走丸也周武任數殖情果敢雄斷擁三秦之銳屬攻昧之秋削平天下易同俯拾未及三祀宮車晚駕嗣子披猖肆其凶慝真人革命宗廟為墟此蓋天所以啟大隋非不幸也文苑英華七百五十一經大慈照寺詩序從駕經大慈照寺詩序皇帝以上叡統天大明御極彈壓九代驅駕百王至德上通深仁下漏威稜西被聲教東漸布政合宮孝儀太室張樂洞野會計苖山天不愛寶神靡遺貺鱗羽效異山澤薦祉華裔率從幽顯咸秩八政惟序六府告平猶且棲志窅冥凝神空寂俯陋區域顧遺形有救精民于苦器拯欲界于危城身心澄淨樂之境生靈仰調御之力中宮厚德載物正位儷天道冠邵陵業踰㜪姒慧雲朝起四生佇其寸合慈燈夜爇九服照其餘光乃睠參墟實唯唐舊山川周衛襟帶巖坰東郊勝地爰構寶坊儼若化成瞬如踊出既而景躔西陸氣中南呂商風振野白露戒寒聖主御辯巡方順時育物六龍進駕七聖齊軫翠旗揚旆雕玉徐輪間百年而拜輦朝萬靈以案節熊渠佽飛之輩入參中壘虎殿金門之侶迥望屬車將屆下都遘茲淨域兼悅鷲山之觀共喜龍宮之遊接足栖心俱展誠敬課虛引寂仍發詠歌雖事比擊轅義同叩角亦以雍容盛烈述讚休美豈若皋朔文辭甫陳男祝王谷蟲篆纔譬女工作者二十六人其詞云爾廣弘明集三十下盧記室誄盧紀記室誄齊天統二年秋七月司徒記室參軍事永安鄉男范陽盧詢祖卒先民有言惟德可久抑又聞之惟名為壽爾之無祿沒而不朽乃授弱翰告哀良友遂作誄曰皇虛眇邈師緒蟬聯大儒漢世名公魏年司徒藹藹撫翼沖天尚書亹亹亦稱象賢若人擢秀絕後光前發榮隨浦韞耀春田爰在弱齡孤根迥立內無怙恃外寡朋執行有餘力蓺無不習善價斯待香名允集下學上達鑽幽洞微九流百氏異軫同歸文成鍾律韻響珠璣麗詞泉湧壯思雲飛雄州擢第言割其楚我實褎然觀國而舉自茲不調多歷年所游泳儒玄從容嘿語納于大麓崇建府朝八絃所掩車乘翹翹我有明德乃應嘉招超自幕下來儀鳳條應徐竝轍潘顧齊鑣聲華簪帶譽動朋僚逖矣江陰承風請朔莊生喻指季子觀樂立朝所寄俊才優學懸河自口靈珠在握乃參軍事仍贊中鉉大沖所縻德施攸踐同推麗則俱謝蟲篆何才之高何位之鮮天下士也宜享多福豹變其文鴻漸于陸神之聽之于何不淑營魄遂往音儀在目嗚呼哀哉昔余與子分重契深譬諸投漆如彼斷金余慕大隱子惟陸沈等趨宮閣竝綴衣簪春臺共踐秋水偕臨還馬齊轡出蓋連陰良書濁酒永嘯長吟美言俱贊闕行同箴娛樂未幾嶮阻相尋忻既無極憂亦難任云胡不弔亡我知音百年已矣萬事傷心嗚呼哀哉亭伯君山竝嗟湮滅荀粲王壽同悲夭折蘭菊無墜鍾鼓不絕之子云亡何愧前烈靈衣襲几奠酒盈杯故庭飛籜虛帳凝埃僕流離而涕泗驂顧慕以遲迴出南陽之舊道掩北邙之夜臺趙卿之銘已勒滕公之隴未開臨象設而不面詎幽魂之可來嗚呼哀哉文苑英華八百四十二祭漅湖文維開皇元年十二月朔甲子具位姓名遣某官以清酌庶羞之饋敬祭漅湖之靈曰泱漭澄湖南服之紀斜通海甸傍帶江汜深過百仞潤踰九里彭蠡莫儔具區非擬揚越不庭多歷年紀王師薄伐六軍戾止戒期指日馬首欲東常陰作沴零雨其濛水氣朝合天雲夜同申之苦霧繼以嚴風塗泥已甚軌躅不通有稽天罰用沮元戎惟夫百神受職水靈為大皇王御宇率土無外當使日月貞明天地交泰雨師止其淋瀝雲將卷其蔚薈東渡戈船南聳鵰旆收尉佗之黃屋納孫皓之青蓋然後革車旋軫戎卒凱歌楚俘霧集冀馬星羅無德不報有酒如河神之聽之斯言非蹉初學記七遼陽山寺願文齊興二十有三載區宇乂安列聖重光百神受職天平地成禮諧樂暢劍戟亡鑄江海無波皇帝體膺上哲運鍾下武以至德字黔首大明臨赤縣深仁俯漏惠化潛通榮鏡六幽昭蘇八表唐旌已立芻輿不遠而至殷網既開肖翹咸遂其所壇凝休氣渚幕榮光玄扈告符翠媯啟籙阿閣朝諠棘林夜靜西琯協律南鬯迎神衣魚操龜之俗懷音請吏反踵修股之渠膜拜空首四海懾然中外禔福慰候無警書軌大同猶以為負扆垂旒人世微業功成治定域中小道投心覺海束意玄門手執明珠頂文甘露調御天人不徇巖廊之重明行具足寍屑裘冕之尊十力四心東漸西被日月出矣風雨潤之屠門鮑肆化成嚴淨之所蜉蝣蟪蛄網于仁壽之域參墟奧壤王迹所基密都是宅別館攸在襟帶遐長原陸爽秀高巖鬱起作鎮東偏峰羅群玉鷲頭之狀非美樹列三珠雞足之形可陋洞穴條風生和雅之曲圓珠積水流清妙之音于時玉燭調年金商在律職方具禮效駕西巡六龍齊轡七萃案部雷動星移凝鑾佇蹕乃建仁祠于彼勝地成之不日既麗且康昔周夜初明漢池云鑿事隔荒裔道若存亡哲王馭厤弘濟區宇前聖後聖旦暮為期以此勝因仰為武成皇帝及清廟聖靈願西遇彌陀上征兜率雄視三界高臨四衢百年之神俯輕群后一音所導遠同佛日皇太后福踰姜水祉邁塗山壽比太陰業均厚載聖主齊明兩曜合德二儀受錄錯于靈河開金簡于仙嶽龍官鳥紀未可匹其光大象天任地焉能喻其長久皇太子德茂元良道高上嗣牢籠啟誦孕育莊丕六宮眷屬諸王昆弟皆智慧莊嚴玉華松茂永侍披香長固磐石以茲博利被于萬品當使法界虛空生靈動植俱沐定水同陰法雲斯誓或差無取正覺廣弘明集二十八上
